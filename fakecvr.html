<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVR & Brand Generator</title>
    <link rel="icon" href="https://fav.farm/🏭" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #a855f7;
            --bg: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1e293b, #0f172a);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
        }

        .card {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 20px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 0.5rem;
            letter-spacing: 1.5px;
        }

        .value {
            font-family: 'Monaco', monospace;
            color: var(--primary);
            word-wrap: break-word;
        }

        #company-name {
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.5px;
        }

        #cvr-number {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 5px;
            color: var(--primary);
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        button:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        button:active {
            transform: scale(0.98);
        }

        .animate-pop {
            animation: pop 0.4s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Danish CVR Generator</h1>

    <div class="card">
        <span class="label">Company Name</span>
        <div id="company-name" class="value">--------</div>
    </div>

    <div class="card">
        <span class="label">CVR Number</span>
        <div id="cvr-number" class="value">--------</div>
    </div>

    <button id="generateBtn">Generate</button>
</div>

<script>
$(function () {
    const prefixes = ["TNT", "Nordic", "Quantum", "Nexus", "Velocity", "Summit", "Aura", "Nova", "Stream", "Titan", "Zenith"];
    const suffixes = ["TNT" ,"Solutions", "Digital", "Consulting", "Systems", "Labs", "Tech", "Partners", "Dynamics", "Intelligence", "Global"];
    const types = ["ApS", "A/S", "I/S", "PMV"];

    $("#generateBtn").click(function () {
        // --- 1. Generate Company Name ---
        const randomPre = prefixes[Math.floor(Math.random() * prefixes.length)];
        const randomSuf = suffixes[Math.floor(Math.random() * suffixes.length)];
        const randomType = types[Math.floor(Math.random() * types.length)];
        const fullName = `${randomPre} ${randomSuf} ${randomType}`;

        // --- 2. Generate Valid CVR ---
        let cvr = "";
        let isValid = false;

        while (!isValid) {
            let input7 = "";
            for (let i = 0; i < 7; i++) {
                input7 += Math.floor(Math.random() * 10);
            }

            let lastDigit = calculateCvrCheckDigit(input7);

            if (lastDigit !== 10) {
                cvr = input7 + (lastDigit === 11 ? 0 : lastDigit);
                isValid = true;
            }
        }

        // --- 3. Update UI ---
        $("#company-name").text(fullName).addClass('animate-pop');
        $("#cvr-number").text(cvr).addClass('animate-pop');

        // Clean up animation classes
        setTimeout(() => {
            $(".value").removeClass('animate-pop');
        }, 400);
    });

    function calculateCvrCheckDigit(input7) {
        const weights = [2, 7, 6, 5, 4, 3, 2];
        let sum = 0;
        for (let i = 0; i < 7; i++) {
            sum += parseInt(input7.charAt(i), 10) * weights[i];
        }
        let remainder = sum % 11;
        return remainder === 0 ? 0 : 11 - remainder;
    }
});
</script>

</body>
</html>
